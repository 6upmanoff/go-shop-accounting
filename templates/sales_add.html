{{define "sales_add.html"}}
    {{template "base" .}}
{{end}}

{{define "title"}}Отпуск со склада{{end}}

{{define "content"}}

<h2>Отпуск со склада</h2>

<form method="POST" action="/sales/add">
    <label for="product_id">Товар</label>
    <select name="product_id" id="product_id" required>
        {{range .Products}}
        <option value="{{.ID}}">{{.Name}}</option>
        {{end}}
    </select>

    <label for="price">Цена за кг</label>
    <input type="number" step="0.01" name="price" id="price" required>

    <label for="qty">Кол-во (кг)</label>
    <input type="number" step="0.001" name="qty" id="qty" required>

    <div class="card" style="margin-top: 10px; margin-bottom: 20px;">
        <div style="font-size: 14px; color: #6b7280;">Итоговая сумма</div>
        <div id="totalPreview" style="font-size: 28px; font-weight: bold; margin-top: 8px;">0.00 ₸</div>
    </div>

    <label for="payment">Тип оплаты</label>
    <select name="payment" id="payment" required>
        <option value="cash">Нал</option>
        <option value="debt">В долг</option>
    </select>

    <div id="clientField" style="display:none;">
        <label for="client_id">Клиент (если в долг)</label>
        <select name="client_id" id="client_id">
            <option value="">—</option>
            {{range .Clients}}
            <option value="{{.ID}}">{{.Name}}</option>
            {{end}}
        </select>
    </div>

    <button type="submit">Сохранить</button>
</form>

<div style="margin-top: 20px;">
    <a class="btn" href="/sales">Список отпуска со склада</a>
</div>

<script>
function toggleClientField() {
    var payment = document.getElementById("payment").value;
    var clientField = document.getElementById("clientField");

    if (payment === "debt") {
        clientField.style.display = "block";
    } else {
        clientField.style.display = "none";
    }
}

function updateTotal() {
    var price = parseFloat(document.getElementById("price").value) || 0;
    var qty = parseFloat(document.getElementById("qty").value) || 0;
    var total = price * qty;

    document.getElementById("totalPreview").textContent = total.toFixed(2) + " ₸";
}

document.getElementById("payment").addEventListener("change", toggleClientField);
document.getElementById("price").addEventListener("input", updateTotal);
document.getElementById("qty").addEventListener("input", updateTotal);

toggleClientField();
updateTotal();
</script>

{{end}}
