{{define "purchase.html"}}
    {{template "base" .}}
{{end}}

{{define "title"}}Добавить закупку{{end}}

{{define "content"}}

<h2>Добавить закупку</h2>

<form method="POST" action="/purchase">
    <label for="product_id">Товар</label>
    <select name="product_id" id="product_id" required>
        {{range .Products}}
        <option value="{{.ID}}">{{.Name}}</option>
        {{end}}
    </select>

    <label for="price">Цена за кг</label>
    <input type="number" step="0.01" name="price" id="price" required>

    <label for="qty">Кол-во (кг)</label>
    <input type="number" step="0.001" name="qty" id="qty" required>

    <div class="card" style="margin-top: 10px; margin-bottom: 20px;">
        <div style="font-size: 14px; color: #6b7280;">Сумма закупки</div>
        <div id="totalPreview" style="font-size: 28px; font-weight: bold; margin-top: 8px;">0.00 ₸</div>
    </div>

    <button type="submit">Сохранить</button>
</form>

<div style="margin-top: 20px;">
    <a class="btn" href="/">Назад</a>
</div>

<script>
function updateTotal() {
    var price = parseFloat(document.getElementById("price").value) || 0;
    var qty = parseFloat(document.getElementById("qty").value) || 0;
    var total = price * qty;

    document.getElementById("totalPreview").textContent = total.toFixed(2) + " ₸";
}

document.getElementById("price").addEventListener("input", updateTotal);
document.getElementById("qty").addEventListener("input", updateTotal);

updateTotal();
</script>

{{end}}
